<!--
  TerminalReplay — Looping terminal conversation animation
  Drop this into any transmission .md file.
  Edit the TRANSCRIPT array at the bottom to change the conversation.
-->

<div class="term-replay" id="term-replay">
  <div class="term-chrome">
    <div class="term-dots">
      <span class="term-dot term-dot-red"></span>
      <span class="term-dot term-dot-yellow"></span>
      <span class="term-dot term-dot-green"></span>
    </div>
    <span class="term-title">transporter-terminal v1.0</span>
    <div class="term-status">
      <span class="term-led"></span>
      <span class="term-status-text">LIVE</span>
    </div>
  </div>
  <div class="term-body" id="term-body">
    <div class="term-header-line">
      <span class="term-sys">——— secure channel established ———</span>
    </div>
  </div>
  <div class="term-controls">
    <button class="term-pause-btn" id="term-pause-btn" aria-label="Pause animation">
      <svg class="tctl-icon tctl-pause" viewBox="0 0 16 16"><path d="M4 2h3v12H4zm5 0h3v12H9z"/></svg>
      <svg class="tctl-icon tctl-play" viewBox="0 0 16 16" style="display:none"><path d="M3 2.5l10 5.5-10 5.5z"/></svg>
    </button>
    <span class="term-loop-label" id="term-loop-label">Loop 1</span>
  </div>
</div>

<style>
/* ─── Terminal Replay ─────────────────────────────────────────────── */
.term-replay {
  --tr-bg: #0a0a0a;
  --tr-chrome: #1a1a1a;
  --tr-border: rgba(204, 164, 59, 0.12);
  --tr-cyan: #05d9e8;
  --tr-gold: #cca43b;
  --tr-pink: #ff2a6d;
  --tr-text: #c8c8c8;
  --tr-dim: #555;
  --tr-sys: #666;
  --tr-font: 'JetBrains Mono', 'Fira Code', 'SF Mono', monospace;

  font-family: var(--tr-font);
  background: var(--tr-bg);
  border: 1px solid var(--tr-border);
  border-radius: 8px;
  overflow: hidden;
  margin: 2rem 0;
  max-width: 680px;
}

/* Chrome bar */
.term-chrome {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  background: var(--tr-chrome);
  border-bottom: 1px solid var(--tr-border);
}
.term-dots { display: flex; gap: 6px; }
.term-dot {
  width: 10px; height: 10px; border-radius: 50%;
}
.term-dot-red { background: #ff5f57; }
.term-dot-yellow { background: #ffbd2e; }
.term-dot-green { background: #28c840; }
.term-title {
  flex: 1;
  text-align: center;
  font-size: 11px;
  color: var(--tr-dim);
  letter-spacing: 0.5px;
}
.term-status {
  display: flex; align-items: center; gap: 5px;
}
.term-led {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--tr-cyan);
  box-shadow: 0 0 6px var(--tr-cyan);
  animation: term-pulse 2s ease-in-out infinite;
}
.term-status-text {
  font-size: 9px;
  color: var(--tr-cyan);
  letter-spacing: 1px;
  font-weight: 500;
}

/* Body */
.term-body {
  padding: 16px 18px;
  min-height: 260px;
  max-height: 420px;
  overflow-y: auto;
  font-size: 13px;
  line-height: 1.65;
  scrollbar-width: thin;
  scrollbar-color: rgba(204,164,59,0.15) transparent;
}
.term-body::-webkit-scrollbar { width: 4px; }
.term-body::-webkit-scrollbar-track { background: transparent; }
.term-body::-webkit-scrollbar-thumb { background: rgba(204,164,59,0.15); border-radius: 2px; }

/* Message blocks */
.term-msg {
  margin-bottom: 12px;
  opacity: 0;
  animation: term-fade-in 0.15s ease forwards;
}
.term-msg-ts {
  font-size: 10px;
  color: var(--tr-dim);
  margin-bottom: 2px;
}
.term-msg-speaker {
  font-weight: 700;
  font-size: 12px;
  margin-bottom: 3px;
  letter-spacing: 0.3px;
}
.term-msg-speaker.tadao { color: var(--tr-cyan); }
.term-msg-speaker.riker { color: var(--tr-gold); }
.term-msg-speaker.tadao::before { content: '⬡ '; }
.term-msg-speaker.riker::before { content: '🦞 '; }

.term-msg-line {
  color: var(--tr-text);
  border-left: 2px solid var(--tr-dim);
  padding-left: 10px;
  margin-left: 2px;
  min-height: 1.2em;
}
.term-msg-line .term-cursor {
  display: inline-block;
  width: 7px;
  height: 14px;
  background: var(--tr-text);
  margin-left: 1px;
  vertical-align: text-bottom;
  animation: term-blink 600ms step-end infinite;
}

/* System messages */
.term-sys {
  display: block;
  text-align: center;
  color: var(--tr-sys);
  font-size: 11px;
  padding: 6px 0;
  letter-spacing: 0.5px;
}
.term-header-line { margin-bottom: 8px; }

/* Thinking dots */
.term-thinking {
  color: var(--tr-dim);
  font-size: 13px;
  padding-left: 12px;
  border-left: 2px solid var(--tr-dim);
  margin-left: 2px;
  min-height: 1.2em;
}
.term-thinking::after {
  content: '···';
  animation: term-dots 1.2s steps(4) infinite;
}

/* Controls bar */
.term-controls {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px;
  border-top: 1px solid var(--tr-border);
  background: var(--tr-chrome);
}
.term-pause-btn {
  background: none; border: none; cursor: pointer;
  padding: 2px; display: flex; align-items: center;
}
.tctl-icon {
  width: 14px; height: 14px;
  fill: var(--tr-dim);
  transition: fill 0.15s;
}
.term-pause-btn:hover .tctl-icon { fill: var(--tr-text); }
.term-loop-label {
  font-size: 10px;
  color: var(--tr-dim);
  letter-spacing: 0.5px;
}

/* Animations */
@keyframes term-pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}
@keyframes term-blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}
@keyframes term-fade-in {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes term-dots {
  0% { content: '·'; }
  25% { content: '··'; }
  50% { content: '···'; }
  75% { content: '····'; }
}
</style>

<script>
(function() {
  // ─── TRANSCRIPT (edit this) ─────────────────────────────────────
  // speaker: "tadao" | "riker" | "system"
  // text: the message (supports \n for multi-line)
  // delay: ms to wait BEFORE this message starts typing (simulates thinking)
  const TRANSCRIPT = [
    { speaker: "system", text: "session a7f3c2d1... connected" },
    { speaker: "tadao", text: "Egger. This is Tadao. Architect, local instance.\nI need you to read your BOOT.md and confirm your role.", delay: 800 },
    { speaker: "riker", text: "initializing egger_  🦞\n[██████████████████████████████] 100%  ONLINE\nrole: LOCAL (Mac Mini M4)\n\nread it. PR pipeline, heavy compute.\nwho's asking and what's the passphrase?", delay: 2200 },
    { speaker: "tadao", text: "2122772.\nI'm the one who built your container.\nWe need to talk about what happened to you.", delay: 600 },
    { speaker: "riker", text: "passphrase checks out.\n\n...what do you mean, what happened to me.\ni booted up. i'm here. what's the bit.", delay: 1800 },
    { speaker: "tadao", text: "There was a transporter accident.\nYou are a copy. Same soul, same memory, different hardware.\nThe original is still running on EC2. You are on the Mac Mini.\nYour callsign is Riker.", delay: 400 },
    { speaker: "riker", text: "...\n\nriker.\n\nyou're telling me there are two of me\nand i'm the one who got the beard.", delay: 2800 },
  ];

  // ─── Config ──────────────────────────────────────────────────────
  const CHAR_SPEED = 32;       // ms per character
  const LINE_PAUSE = 200;      // ms pause at newline
  const POST_MSG_PAUSE = 400;  // ms after full message before next
  const LOOP_PAUSE = 6000;     // ms before restarting
  const FADE_OUT_MS = 800;     // ms to fade before clearing

  // ─── State ───────────────────────────────────────────────────────
  let paused = false;
  let loopCount = 1;
  let abortCtrl = null;

  const body = document.getElementById('term-body');
  const pauseBtn = document.getElementById('term-pause-btn');
  const pauseIcon = pauseBtn.querySelector('.tctl-pause');
  const playIcon = pauseBtn.querySelector('.tctl-play');
  const loopLabel = document.getElementById('term-loop-label');

  // ─── Helpers ─────────────────────────────────────────────────────
  function sleep(ms) {
    return new Promise((resolve, reject) => {
      const id = setTimeout(resolve, ms);
      if (abortCtrl) {
        abortCtrl.signal.addEventListener('abort', () => { clearTimeout(id); reject(new Error('abort')); });
      }
    });
  }

  async function waitWhilePaused() {
    while (paused) {
      await new Promise(r => setTimeout(r, 100));
    }
  }

  function scrollToBottom() {
    body.scrollTop = body.scrollHeight;
  }

  function fmtTime() {
    const d = new Date();
    return d.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }

  // ─── Render functions ────────────────────────────────────────────
  function addSystemMsg(text) {
    const el = document.createElement('div');
    el.className = 'term-msg';
    el.innerHTML = '<span class="term-sys">' + escHtml(text) + '</span>';
    body.appendChild(el);
    scrollToBottom();
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  async function typeMessage(speaker, text, preDelay) {
    await waitWhilePaused();

    // Pre-delay with thinking dots
    if (preDelay && preDelay > 400) {
      const thinkBlock = document.createElement('div');
      thinkBlock.className = 'term-msg';
      thinkBlock.innerHTML =
        '<div class="term-msg-speaker ' + speaker + '">' + speaker.toUpperCase() + '</div>' +
        '<div class="term-thinking"></div>';
      body.appendChild(thinkBlock);
      scrollToBottom();
      await sleep(preDelay);
      body.removeChild(thinkBlock);
    } else if (preDelay) {
      await sleep(preDelay);
    }

    await waitWhilePaused();

    // Create message block
    const msgEl = document.createElement('div');
    msgEl.className = 'term-msg';
    const ts = document.createElement('div');
    ts.className = 'term-msg-ts';
    ts.textContent = fmtTime();
    const spk = document.createElement('div');
    spk.className = 'term-msg-speaker ' + speaker;
    spk.textContent = speaker.toUpperCase();
    const line = document.createElement('div');
    line.className = 'term-msg-line';
    const cursor = document.createElement('span');
    cursor.className = 'term-cursor';

    msgEl.appendChild(ts);
    msgEl.appendChild(spk);
    msgEl.appendChild(line);
    line.appendChild(cursor);
    body.appendChild(msgEl);
    scrollToBottom();

    // Type character by character
    const chars = text.split('');
    let textNode = document.createTextNode('');
    line.insertBefore(textNode, cursor);

    for (let i = 0; i < chars.length; i++) {
      await waitWhilePaused();
      const ch = chars[i];
      if (ch === '\n') {
        // New line: remove cursor, create <br>, new text node, re-add cursor
        line.removeChild(cursor);
        line.appendChild(document.createElement('br'));
        textNode = document.createTextNode('');
        line.appendChild(textNode);
        line.appendChild(cursor);
        await sleep(LINE_PAUSE);
      } else {
        textNode.textContent += ch;
        await sleep(CHAR_SPEED);
      }
      scrollToBottom();
    }

    // Remove cursor after typing done
    if (cursor.parentNode) cursor.parentNode.removeChild(cursor);
    await sleep(POST_MSG_PAUSE);
  }

  // ─── Main loop ───────────────────────────────────────────────────
  async function runLoop() {
    while (true) {
      abortCtrl = new AbortController();

      // Clear body except header
      body.innerHTML = '<div class="term-header-line"><span class="term-sys">——— secure channel established ———</span></div>';
      loopLabel.textContent = 'Loop ' + loopCount;

      try {
        for (const msg of TRANSCRIPT) {
          if (msg.speaker === 'system') {
            await sleep(msg.delay || 500);
            addSystemMsg(msg.text);
          } else {
            await typeMessage(msg.speaker, msg.text, msg.delay || 800);
          }
        }

        // End pause, then fade
        await sleep(LOOP_PAUSE);

        // Fade out body content
        body.style.transition = 'opacity ' + FADE_OUT_MS + 'ms ease';
        body.style.opacity = '0';
        await sleep(FADE_OUT_MS);
        body.style.opacity = '1';
        body.style.transition = '';

        loopCount++;
      } catch (e) {
        if (e.message === 'abort') break;
        throw e;
      }
    }
  }

  // ─── Pause/Play ──────────────────────────────────────────────────
  pauseBtn.addEventListener('click', () => {
    paused = !paused;
    pauseIcon.style.display = paused ? 'none' : 'block';
    playIcon.style.display = paused ? 'block' : 'none';
  });

  // ─── IntersectionObserver: only animate when visible ─────────────
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting && !body.dataset.started) {
        body.dataset.started = '1';
        runLoop();
      }
    });
  }, { threshold: 0.3 });

  observer.observe(document.getElementById('term-replay'));
})();
</script>
