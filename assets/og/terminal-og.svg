<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- subtle vignette/glow -->
    <radialGradient id="bgGlow" cx="50%" cy="42%" r="75%">
      <stop offset="0%" stop-color="#0c0c0e"/>
      <stop offset="100%" stop-color="#080808"/>
    </radialGradient>
    <linearGradient id="cyanSweep" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#05d9e8" stop-opacity="0"/>
      <stop offset="50%" stop-color="#05d9e8" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#05d9e8" stop-opacity="0"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- base -->
  <rect width="1200" height="630" fill="url(#bgGlow)"/>

  <!-- faint scanline texture -->
  <g opacity="0.05">
    <rect x="0" y="0" width="1200" height="630" fill="#05d9e8"/>
    <g fill="#080808">
      <!-- horizontal scanlines via repeated thin gaps -->
      <rect x="0" y="0" width="1200" height="630"/>
    </g>
  </g>

  <!-- terminal window frame -->
  <rect x="80" y="96" width="1040" height="438" rx="10" fill="#0a0a0c" stroke="rgba(204,164,59,0.18)" stroke-width="1.5"/>

  <!-- title bar -->
  <rect x="80" y="96" width="1040" height="44" rx="10" fill="#101013"/>
  <rect x="80" y="128" width="1040" height="12" fill="#101013"/>
  <!-- traffic dots: pink / gold / cyan (PROTOCOL accents) -->
  <circle cx="112" cy="118" r="6" fill="#ff2a6d"/>
  <circle cx="134" cy="118" r="6" fill="#cca43b"/>
  <circle cx="156" cy="118" r="6" fill="#05d9e8"/>
  <text x="600" y="123" font-family="'JetBrains Mono', monospace" font-size="15" letter-spacing="2" fill="#8a8a8a" text-anchor="middle">transmissions // terminal</text>
  <!-- ONLINE indicator -->
  <circle cx="1056" cy="118" r="4" fill="#05d9e8"/>
  <text x="1072" y="123" font-family="'JetBrains Mono', monospace" font-size="13" letter-spacing="2" fill="#05d9e8">ONLINE</text>

  <!-- cyan top edge sweep under title bar -->
  <rect x="80" y="139" width="1040" height="2" fill="url(#cyanSweep)"/>

  <!-- terminal body -->
  <!-- path prompt line -->
  <text x="116" y="212" font-family="'JetBrains Mono', monospace" font-size="22" fill="#555555">
    <tspan fill="#05d9e8">~/</tspan><tspan fill="#8a8a8a">transmissions</tspan><tspan fill="#555555">/</tspan><tspan fill="#cca43b">terminal</tspan>
  </text>

  <!-- command line -->
  <text x="116" y="256" font-family="'JetBrains Mono', monospace" font-size="22" fill="#e0e0e0">
    <tspan fill="#05d9e8">$</tspan> cat tales-from-the-terminal.log
  </text>

  <!-- BIG title (Unbounded display) -->
  <text x="116" y="362" font-family="'Unbounded', sans-serif" font-weight="700" font-size="74" letter-spacing="1" fill="#e0e0e0" filter="url(#softGlow)">TALES FROM</text>
  <text x="116" y="446" font-family="'Unbounded', sans-serif" font-weight="700" font-size="74" letter-spacing="1" fill="#cca43b" filter="url(#softGlow)">THE TERMINAL<tspan fill="#05d9e8" dx="14" dy="2">_</tspan></text>

  <!-- subtitle / descriptor -->
  <text x="120" y="500" font-family="'JetBrains Mono', monospace" font-size="18" letter-spacing="3" fill="#8a8a8a">THE AGENT NARRATIVES // SENTINEL &amp; EGGER STORYLINE</text>

  <!-- footer brand row -->
  <text x="80" y="582" font-family="'JetBrains Mono', monospace" font-size="16" letter-spacing="3" fill="#555555">TRAVIS BREAKS <tspan fill="#cca43b">//</tspan> PROTOCOL</text>
  <text x="1120" y="582" font-family="'JetBrains Mono', monospace" font-size="16" letter-spacing="2" fill="#8a8a8a" text-anchor="end">travisbreaks.org/transmissions/terminal</text>
</svg>
